<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Danmaku</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- Two layers, one frame: WebGL for the play field, Canvas2D on top for
         the HUD. The whole screen is the field — 480x640, the traditional 3:4
         portrait — and the HUD composites over its edges; there is no sidebar.
         Only the WebGL layer is three.js. -->
    <div id="stage">
      <canvas id="field" width="480" height="640"></canvas>
      <canvas id="overlay" width="480" height="640"></canvas>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
