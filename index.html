<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A deterministic bullet-hell shooter built with three.js." />
    <meta name="theme-color" content="#04070c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Danmaku" />
    <title>Danmaku</title>
    <link rel="manifest" href="./public/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="./public/icons/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./public/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- Two layers, one frame: WebGL for the play field, Canvas2D on top for
         the HUD. The whole screen is the field — 480x640, the traditional 3:4
         portrait — and the HUD composites over its edges; there is no sidebar.
         Only the WebGL layer is three.js. -->
    <div id="stage">
      <canvas id="field" width="480" height="640"></canvas>
      <canvas id="overlay" width="480" height="640"></canvas>
      <!-- Canvas menus keep their authored rendering; these transparent DOM
           buttons add direct pointer hit targets without changing game state
           outside the fixed-tick digital input path. -->
      <div id="menu-actions" aria-label="Game menu" hidden></div>
      <!-- WebHID permission must be requested from a real DOM click. This
           transparent shell action is positioned over a title-menu row drawn
           by the canvas; it never enters the deterministic game-state menu. -->
      <div id="controller-setup" hidden>
        <button id="controller-connect" type="button">CONNECT CONTROLLER</button>
        <output id="controller-status" aria-live="polite"></output>
      </div>
      <!-- Replay import must originate in a real DOM gesture. The authored
           canvas row opens this hidden picker through its transparent button. -->
      <input
        id="replay-import"
        type="file"
        accept=".json,application/json"
        hidden
      />
      <!-- Browser-owned success/error feedback sits outside both capture
           canvases, so screenshots contain only the authored game frame. -->
      <output id="shell-status" aria-live="polite" hidden></output>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
