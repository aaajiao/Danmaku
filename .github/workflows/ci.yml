name: CI

on:
  pull_request:
  push:
    branches: [main, "agent/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-contracts:
    name: V4 content contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Validate integration bindings
        working-directory: 1bit-stg-complete-asset-kit-v4
        run: python3 -B tools/qa/validate_v4_integration.py
      - name: Validate runtime and executable tests
        working-directory: 1bit-stg-complete-asset-kit-v4
        run: python3 -B runtime/validate_v4_runtime.py --run-code --strict-warnings
      - name: Validate gameplay patterns
        working-directory: 1bit-stg-complete-asset-kit-v4
        run: python3 -B gameplay/tools/validate_gameplay_v4.py
      - name: Validate narrative contracts
        working-directory: 1bit-stg-complete-asset-kit-v4
        run: python3 -B narrative/validate_narrative_v4.py

  app:
    name: App, PWA, smoke and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: stg-dev
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:unit
      - run: bun run build
      - run: bunx --bun playwright install --with-deps chromium
      - run: bun run test:smoke
      - run: bun run test:e2e
      - name: Upload Playwright evidence on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: stg-dev/playwright-report
          if-no-files-found: ignore
          retention-days: 7
